{% extends "base.html" %}
{% block title %}{% if event %}Edit Event{% else %}New Event{% endif %} — tickets.ua{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{% if event %}Edit Event{% else %}New Event{% endif %}</h1>
</div>

<div class="card">
  <form method="post"
        action="{{ url_for('events.update', event_id=event.id) if event else url_for('events.create') }}">
    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" name="title" type="text" required
             value="{{ event.title if event else '' }}">
    </div>

    <div class="form-group">
      <label for="date_time">Date &amp; Time</label>
      <input id="date_time" name="date_time" type="datetime-local" required
             value="{{ event.date_time.strftime('%Y-%m-%dT%H:%M') if event else '' }}">
    </div>

    <div class="form-group">
      <label for="venue_id">Venue</label>
      <select id="venue_id" name="venue_id" required>
        <option value="">— select venue —</option>
        {% for venue in venues %}
        <option value="{{ venue.id }}"
          {% if event and event.venue_id == venue.id %}selected{% endif %}>
          {{ venue.name }} ({{ venue.city.name }})
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" type="submit">
        {% if event %}Save Changes{% else %}Create Event{% endif %}
      </button>
      <a class="btn btn-secondary" href="{{ url_for('events.index') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
