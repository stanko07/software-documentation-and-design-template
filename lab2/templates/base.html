<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}tickets.ua{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="{{ url_for('events.index') }}">🎫 tickets.ua</a>
    <ul class="nav-links">
      <li><a href="{{ url_for('events.index') }}">Events</a></li>
      <li><a href="{{ url_for('venues.index') }}">Venues</a></li>
      <li><a href="{{ url_for('cities.index') }}">Cities</a></li>
    </ul>
  </nav>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
