{% extends "base.html" %}
{% block title %}Cities — tickets.ua{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Cities</h1>
  <a class="btn btn-primary" href="{{ url_for('cities.new') }}">+ New City</a>
</div>

{% if cities %}
<table class="table">
  <thead>
    <tr><th>Name</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for city in cities %}
    <tr>
      <td>{{ city.name }}</td>
      <td class="actions">
        <a class="btn btn-sm btn-secondary" href="{{ url_for('cities.edit', city_id=city.id) }}">Edit</a>
        <form method="post" action="{{ url_for('cities.delete', city_id=city.id) }}" class="inline-form"
              onsubmit="return confirm('Delete this city?')">
          <button class="btn btn-sm btn-danger" type="submit">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
  <p class="empty">No cities yet.</p>
{% endif %}
{% endblock %}
